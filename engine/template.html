<style>
  /* ============================================================
     Design tokens — ported from the WAKE ALONE / skein design system
     (claude.ai/design handoff). One amber-phosphor hue in four steps,
     three reserved signal colors, a sharp 0-radius terminal shape system.
     ============================================================ */
  :root{
    /* phosphor — the single brand hue, in four steps */
    --phosphor:#ffb000; --phosphor-dim:#8a5f00; --phosphor-faint:#5a4a22; --phosphor-ghost:#3a2f12;
    /* background / surface */
    --bg:#070806; --bg-hi:#11150f; --bg-lo:#020302; --panel:#0d0f0c;
    --bar-track:#1a1d16; --ink-on-signal:#021006;
    /* signal colors — narrative state only, never decorative */
    --red:#ff3b30; --green:#5ad17a; --madness:#c08bff;
    /* phosphor alpha steps */
    --phosphor-a03:rgba(255,176,0,.03); --phosphor-a08:rgba(255,176,0,.08);
    --phosphor-a12:rgba(255,176,0,.12); --phosphor-a18:rgba(255,176,0,.18);
    --phosphor-a25:rgba(255,176,0,.25); --phosphor-a28:rgba(255,176,0,.28);
    /* type */
    --font-display:"VT323","IBM Plex Mono",monospace; --font-body:"IBM Plex Mono",ui-monospace,monospace;
    --tracking-display:2px; --tracking-node:1px; --tracking-hud:.5px;
    --type-small:14px; --type-label:18px;
    /* the radial-void background glow */
    --surface-gradient:radial-gradient(120% 90% at 50% 10%, var(--bg-hi) 0%, var(--bg) 60%, var(--bg-lo) 100%);
    /* degradation driver: 0 = calm/full sanity, 1 = coherence lost */
    --glitch:0; --bleed:0;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  /* Deep-void base on the root so overscroll/rubber-band stays dark (not gray),
     and dark UI chrome (scrollbars). */
  html{background:var(--bg-lo); color-scheme:dark}
  html,body{height:100%}
  body{
    /* The radial glow is the screen's only light source: pin it to the viewport
       (background-attachment:fixed) so it never restarts or seams on scroll, over
       a solid void base. */
    background:var(--bg-lo) var(--surface-gradient) no-repeat fixed;
    color:var(--phosphor); font-family:var(--font-body); font-size:17px;
    line-height:1.65; overflow:hidden; height:100%;
  }
  /* 06 TUBE WARP v2: the whole readable screen scrolls INSIDE this fixed,
     viewport-sized frame, and the barrel filter bows THIS frame. Because it is
     fixed and scrolls internally, the filter region is stable -- content can never
     reflow out of the box (the v1 soft-lock) and nothing magnifies past the column. */
  #crt{position:fixed;inset:0;overflow-y:auto;overflow-x:hidden}
  /* Scanlines (now a child of #crt) curve WITH the glass: when the warp filter is
     active #crt is their containing block, so they pin to the frame and bow with it;
     when it is off they pin to the (identical) viewport box, unwarped. */
  .tube{
    position:fixed;inset:0;pointer-events:none;z-index:50;mix-blend-mode:multiply;transition:opacity .9s ease;
    background:repeating-linear-gradient(0deg, rgba(0,0,0,0) 0px, rgba(0,0,0,0) 2px,
      rgba(0,0,0,calc(0.18 + 0.25*var(--glitch))) 3px, rgba(0,0,0,calc(0.18 + 0.25*var(--glitch))) 4px);
  }
  body::after{
    content:"";position:fixed;inset:0;pointer-events:none;z-index:51;
    box-shadow:inset 0 0 150px 8px rgba(0,0,0,0.62);
    background:radial-gradient(82% 88% at 50% 42%, transparent 74%, rgba(0,0,0,0.4) 100%);
    transition:box-shadow .8s ease, background .8s ease;
  }
  .wrap{max-width:760px;margin:0 auto;padding:28px 22px 120px;position:relative;z-index:1}
  @keyframes flick{0%,100%{opacity:1} 92%{opacity:1}
    93%{opacity:calc(1 - 0.5*var(--glitch))} 94%{opacity:1}
    96%{opacity:calc(1 - 0.7*var(--glitch))} 97%{opacity:1}}
  .screen{animation:flick 6s infinite steps(1)}
  .glitchable{text-shadow:
      calc(1.5px*var(--glitch)) 0 calc(2px*var(--glitch)) rgba(255,0,40,calc(0.7*var(--glitch))),
      calc(-1.5px*var(--glitch)) 0 calc(2px*var(--glitch)) rgba(0,180,255,calc(0.7*var(--glitch)));}
  /* phosphor bloom for hero type (design-system .glow) */
  .glow{text-shadow:0 0 calc(8px + 6px*var(--glitch)) rgba(255,176,0,.45)}
  .hud{position:sticky;top:0;z-index:10;background:linear-gradient(180deg, var(--bg) 70%, transparent);
    padding:10px 0 16px;margin-bottom:10px;border-bottom:1px solid var(--phosphor-a18);}
  .hud-row{display:flex;align-items:flex-start;gap:6px 14px;flex-wrap:wrap;
    font-family:var(--font-display);font-size:clamp(18px,4.5vw,22px);letter-spacing:.5px}
  .loc{color:var(--phosphor);text-transform:uppercase;line-height:1.15}
  .loc .tag{color:var(--phosphor-dim)}
  /* The meter sits on its own full-width row so its position never depends on
     the location label's length (a long LOC used to shove it right + shrink it). */
  .sanity-wrap{flex:1 0 100%;min-width:0}
  .sanity-label{font-family:var(--font-display);font-size:18px;color:var(--phosphor-dim);display:flex;justify-content:space-between}
  .bar{height:10px;background:var(--bar-track);border:1px solid var(--phosphor-a25);margin-top:2px;position:relative;overflow:hidden}
  .bar > i{display:block;height:100%;transition:width .5s ease, background .5s ease}
  .inv{font-family:var(--font-display);font-size:19px;color:var(--phosphor-dim);width:100%;margin-top:4px}
  .inv b{color:var(--phosphor);font-weight:400}
  .medbtn{font-family:var(--font-display);font-size:19px;cursor:pointer;background:transparent;
    color:var(--green);border:1px solid var(--green);padding:1px 10px;letter-spacing:.5px;}
  .medbtn:hover{background:var(--green);color:var(--ink-on-signal)}
  .nodetitle{font-family:var(--font-display);font-size:clamp(24px,6.5vw,30px);color:var(--phosphor);
    text-transform:uppercase;letter-spacing:1px;margin:14px 0 6px}
  .prose p{margin:0 0 16px} .prose{margin-bottom:26px}
  .choice{display:block;width:100%;text-align:left;cursor:pointer;background:var(--phosphor-a03);
    border:1px solid var(--phosphor-a28);color:var(--phosphor);font-family:var(--font-body);
    font-size:16px;padding:12px 16px;margin:8px 0;line-height:1.45;transition:background .15s,border-color .15s,transform .05s;}
  .choice::before{content:"> ";color:var(--phosphor-dim)}
  .choice:hover{background:var(--phosphor-a12);border-color:var(--phosphor)}
  .choice:active{transform:translateX(2px)}
  .choice.locked{cursor:not-allowed;color:var(--phosphor-faint);border-color:rgba(255,176,0,.1);background:transparent;}
  .choice.locked::before{content:"x "}
  .title-screen{padding-top:40px;text-align:center}
  .bigtitle{font-family:var(--font-display);font-size:clamp(46px,14vw,84px);line-height:.9;letter-spacing:2px}
  .sub{font-family:var(--font-display);font-size:24px;color:var(--phosphor-dim);margin:6px 0 40px}
  .eplist{max-width:520px;margin:0 auto;text-align:left}
  .epcard{border:1px solid var(--phosphor-a28);padding:16px 18px;margin:12px 0;cursor:pointer;transition:background .15s,border-color .15s}
  .epcard:hover{background:var(--phosphor-a08);border-color:var(--phosphor)}
  .epcard.locked{cursor:not-allowed;color:var(--phosphor-faint);border-color:rgba(255,176,0,.1)}
  .epcard .epn{font-family:var(--font-display);font-size:18px;color:var(--phosphor-dim)}
  .epcard .ept{font-family:var(--font-display);font-size:clamp(24px,6.5vw,30px);letter-spacing:1px}
  .epcard .epb{font-size:14px;color:var(--phosphor-dim);margin-top:4px}
  .ending{padding-top:30px}
  .ending .stamp{font-family:var(--font-display);font-size:clamp(30px,9vw,46px);letter-spacing:2px;margin-bottom:18px;min-height:1em}
  .stamp.dead{color:var(--red)} .stamp.escape{color:var(--green)} .stamp.madness{color:var(--madness)}
  .restart{margin-top:30px}
  .footer{margin-top:60px;font-family:var(--font-display);font-size:16px;color:var(--phosphor-ghost);text-align:center}
  /* discreet in-theme source link: reads as part of the ghost-dim footer, warms to
     phosphor only on hover/focus -- present but never competing with the story. */
  .footer .src{color:inherit;text-decoration:none;border-bottom:1px solid var(--phosphor-ghost);transition:color .25s,border-color .25s}
  .footer .src:hover,.footer .src:focus{color:var(--phosphor-dim);border-color:var(--phosphor-dim)}
  .footer .abort{font:inherit;color:var(--phosphor-ghost);background:transparent;border:0;border-bottom:1px solid var(--phosphor-ghost);padding:0;cursor:pointer;transition:color .25s,border-color .25s}
  .footer .abort:hover,.footer .abort:focus{color:var(--phosphor-dim);border-color:var(--phosphor-dim)}
  .cursor{display:inline-block;width:9px;height:18px;background:var(--phosphor);margin-left:3px;
    animation:blink 1.1s steps(1) infinite;vertical-align:-2px}
  @keyframes blink{50%{opacity:0}}

  /* ============================================================
     DESCENT — five+one degradation enhancements (design-system handoff).
     Driven by the same --glitch / sanity tier the engine already tracks.
     ============================================================ */

  /* ---- 01 THE STAIRCASE: tier FX overlays, viewport-fixed ---- */
  .fx{position:fixed;inset:0;pointer-events:none;z-index:52}
  .fx-bleed{position:absolute;inset:0;mix-blend-mode:screen;opacity:0;transition:opacity .7s ease;
    background:radial-gradient(125% 100% at 50% 50%, transparent 52%, rgba(255,59,48,.55) 100%)}
  html[data-tier="critical"] .fx-bleed, html[data-tier="terminal"] .fx-bleed{opacity:var(--bleed)}
  .fx-roll{position:absolute;left:0;right:0;height:9%;top:-14%;opacity:0;
    background:linear-gradient(180deg, transparent, rgba(255,176,0,.05) 38%, rgba(0,0,0,.42) 50%, rgba(255,176,0,.05) 62%, transparent)}
  .fx-heart{position:absolute;inset:0;opacity:0;
    background:radial-gradient(78% 78% at 50% 52%, rgba(255,59,48,.5), transparent 70%)}
  .fx-wash{position:absolute;inset:0;opacity:0;transition:opacity 1.2s ease;
    background:radial-gradient(90% 80% at 50% 45%, rgba(192,139,255,.14), transparent 70%)}
  html.madness .fx-wash{opacity:1}
  @keyframes fx-breathe{0%,100%{transform:scale(1);opacity:calc(var(--bleed)*.6)}50%{transform:scale(1.05);opacity:var(--bleed)}}
  @keyframes fx-roll{0%{top:-14%}100%{top:114%}}
  @keyframes fx-heart{0%{opacity:0}6%{opacity:.26}13%{opacity:.02}20%{opacity:.18}28%{opacity:0}100%{opacity:0}}
  @media (prefers-reduced-motion: no-preference){
    html[data-tier="critical"] .fx-bleed, html[data-tier="terminal"] .fx-bleed{animation:fx-breathe 5s ease-in-out infinite}
    html[data-tier="strained"] .fx-roll{animation:fx-roll 9s linear infinite;opacity:1}
    html[data-tier="critical"] .fx-roll{animation:fx-roll 6s linear infinite;opacity:1}
    html[data-tier="terminal"] .fx-roll{animation:fx-roll 3.4s linear infinite;opacity:1}
    html[data-tier="terminal"] .fx-heart{animation:fx-heart 2.3s ease-out infinite}
  }

  /* ---- 02 INSTRUMENT FAILURE: the HUD quivers and lies ---- */
  @keyframes hud-quiver{0%,100%{transform:translateX(0)}25%{transform:translateX(.7px)}75%{transform:translateX(-.7px)}}
  @media (prefers-reduced-motion: no-preference){
    .hud.deep .bar > i{animation:hud-quiver .16s steps(2) infinite}
  }
  .hud.corrupt .sanity-label span:last-child{color:var(--red)}

  /* ---- 03 THE WATCHING: an intrusive line, then gone ---- */
  .watch{position:fixed;inset:0;z-index:55;pointer-events:none}
  .watch-line{position:absolute;left:50%;top:45%;transform:translate(-50%,-50%);
    max-width:min(76vw,460px);font-family:var(--font-display);letter-spacing:var(--tracking-display);
    font-size:clamp(22px,5vw,32px);line-height:1.12;text-align:center;color:var(--phosphor);
    text-shadow:0 0 14px rgba(255,176,0,.55);animation:watch-in var(--watch-dur,1s) steps(1,end) forwards}
  .watch-line[data-sev="terminal"]{color:var(--red);text-shadow:0 0 16px rgba(255,59,48,.6)}
  @keyframes watch-in{0%{opacity:0}8%{opacity:1}12%{opacity:.1}18%{opacity:1}26%{opacity:.2}30%{opacity:1}82%{opacity:1}88%{opacity:.15}100%{opacity:0}}
  @media (prefers-reduced-motion: reduce){ .watch-line{animation:none;opacity:.9} }

  /* ---- 04 DEATH GIVEN WEIGHT: the stop, the crush, the inversion ---- */
  .endblack{min-height:60vh;display:flex;align-items:center;justify-content:center}
  .endprose{opacity:0;animation:fade-in 1.2s ease forwards}
  @keyframes fade-in{to{opacity:1}}
  html.crush body::after{box-shadow:inset 0 0 240px 30px rgba(0,0,0,0.92);
    background:radial-gradient(70% 70% at 50% 48%, transparent 40%, rgba(0,0,0,.6) 100%)}
  /* madness inverts the machine: scanlines stop, purple, stillness */
  html.madness body{background:var(--bg-lo) radial-gradient(120% 95% at 50% 12%, #120c1c 0%, #07060b 60%, #030205 100%) no-repeat fixed}
  html.madness .tube{opacity:0}
  html.madness .screen{animation:none}
  .madprose p{color:var(--madness);opacity:0;animation:mad-fade 2.6s ease forwards}
  @keyframes mad-fade{to{opacity:.92}}
  .cursor.solid{animation:none;opacity:1}
  .cursor.dying{animation:none;opacity:0;transition:opacity 2.4s ease;background:var(--madness)}

  /* ---- 05 THE BLACK REMEMBERS: scar line on a salvage-menu card ---- */
  .epcard .scar{font-family:var(--font-display);font-size:var(--type-small);letter-spacing:var(--tracking-hud);margin-top:8px}
  .scar--dead,.scar--madness{color:var(--red)} .scar--escape{color:var(--green)}

  /* Accessibility: hold the calm state -- no flicker or cursor blink. */
  @media (prefers-reduced-motion: reduce){ .screen{animation:none} .cursor{animation:none} }

  /* ---- LAB: staging-only FX showcase (#lab). Never reached by players. ---- */
  .lab{position:fixed;top:0;right:0;z-index:80;width:264px;max-height:100vh;overflow:auto;
    background:rgba(6,8,10,.93);border-left:1px solid var(--phosphor-dim);
    font-family:var(--font-display);color:var(--phosphor);font-size:12px;
    letter-spacing:var(--tracking-hud);padding:14px 14px 22px;line-height:1.5;
    text-shadow:0 0 6px rgba(255,176,0,.25)}
  .lab h2{font-size:13px;margin:0 0 12px;letter-spacing:2px}
  .lab .grp{margin:0 0 13px;padding-bottom:12px;border-bottom:1px solid rgba(255,176,0,.12)}
  .lab label{display:block;color:var(--phosphor-dim);margin:0 0 5px;font-size:11px}
  .lab select,.lab input[type=range]{width:100%;background:transparent;color:var(--phosphor);
    border:1px solid var(--phosphor-dim);font-family:var(--font-display);font-size:11px}
  .lab .row{display:flex;gap:6px;flex-wrap:wrap;margin-top:7px}
  .lab button{flex:1 0 auto;background:transparent;border:1px solid var(--phosphor-dim);
    color:var(--phosphor);font-family:var(--font-display);font-size:11px;letter-spacing:1px;
    padding:6px 7px;cursor:pointer}
  .lab button:hover{border-color:var(--phosphor);box-shadow:0 0 8px rgba(255,176,0,.3)}
  .lab button.on{background:var(--phosphor);color:#0a0705}
  .lab .read{color:var(--green)}
  .lab .read.tier-critical,.lab .read.tier-terminal{color:var(--red)}
  .lab .hint{color:var(--phosphor-ghost);font-size:10px;margin-top:6px;line-height:1.45}
  .lab .wsl{margin-top:7px}
  .lab .wsl span{display:block;color:var(--phosphor-dim);font-size:10px;margin-bottom:2px}
  .lab .wsl b{color:var(--green);font-weight:normal}
  .lab-toggle{display:block;width:100%;text-align:left;background:transparent;border:0;
    color:var(--phosphor);font-family:var(--font-display);font-size:13px;letter-spacing:2px;
    padding:0 0 12px;margin:0;cursor:pointer}
  .lab-caret{float:right;color:var(--phosphor-dim)}
  .lab.collapsed{width:auto;max-width:none;overflow:visible}
  .lab.collapsed .lab-body{display:none}
  .lab.collapsed .lab-toggle{padding-bottom:0}
</style>

<body>
<!-- 01/03/04 fixed FX overlays: tier bleed, vsync roll, terminal heartbeat, madness wash.
     Kept OUTSIDE #crt -- radial glows read best flat/undistorted. -->
<div class="fx" id="fx" aria-hidden="true">
  <div class="fx-bleed"></div><div class="fx-roll"></div><div class="fx-heart"></div><div class="fx-wash"></div>
</div>
<!-- 06 TUBE WARP: the barrel-distortion filter is injected here at runtime -->
<svg id="warpdefs" width="0" height="0" aria-hidden="true" style="position:fixed;width:0;height:0;overflow:hidden;pointer-events:none"><defs></defs></svg>
<!-- 06 TUBE WARP v2: fixed viewport frame; the barrel filter bows everything inside it
     (scanlines + HUD + story) as one piece of curved glass. The ONE scroll container. -->
<div id="crt">
  <!-- scanline overlay; pinned to the frame, curves with it -->
  <div class="tube" id="tube" aria-hidden="true"></div>
  <div class="wrap screen" id="root"></div>
</div>
<!-- 03 THE WATCHING: intrusive line overlay (flat, above the glass) -->
<div class="watch" id="watch" aria-hidden="true"></div>
<script>
/* ===== content injected at build time ===== */
let MANIFEST = { title:"WAKE ALONE", subtitle:"preview build (no episodes injected)" };
let EPISODES = [];
let ITEM_NAMES = {};
let VERSION = "dev"; // build injects the real package.json version
/*__INJECT__*/

/* ===== engine (deterministic runtime) ===== */
const root = document.getElementById("root");
const html = document.documentElement;
const fxEl = document.getElementById("fx");
const watchEl = document.getElementById("watch");
const crtEl = document.getElementById("crt"); // 06v2: the fixed scroll frame (window no longer scrolls)
let episode=null, state=null;
/* The window is locked (body overflow:hidden); #crt is the scroll container, so
   every "back to top" must scroll the frame, not the window. */
function scrollTop(smooth){
  if(crtEl) crtEl.scrollTo({top:0, behavior: smooth ? "smooth" : "auto"});
  else window.scrollTo(0,0);
}
const clamp=(n,a,b)=>Math.max(a,Math.min(b,n));
const rnd=(a,b)=>a+Math.random()*(b-a);
const esc=(s)=>String(s).replace(/[&<>]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]));
const REDUCED = !!(window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches);

/* Every DESCENT enhancement is on; flip any to false to disable it.
   warp(06) bows the scanline OVERLAY (#tube) only, never the readable content -
   so it can never clip text or hide choices. (An earlier version warped the
   content itself and soft-locked the run; see docs/future-enhancements.md for
   the fuller fixed-viewport tube idea.) */
const FEAT = { tiers:true, hud:true, watching:true, endings:true, scars:true, warp:true };

/* 01 — the staircase: sanity becomes named tiers. */
function tierOf(s){ if(s>60)return"stable"; if(s>30)return"strained"; if(s>10)return"critical"; if(s>0)return"terminal"; return"gone"; }
function isPlayNode(){ const n=episode&&state&&episode.nodes[state.current]; return !!(n && !n.ending && state.sanity>0); }

/* Drive every sanity-linked screen effect: glitch, tier, edge-bleed, dim, warp. */
function setScreen(play){
  const g = state ? (100-state.sanity)/100 : 0;
  html.style.setProperty("--glitch", g.toFixed(2));
  const tier = state ? tierOf(state.sanity) : "stable";
  html.style.setProperty("--bleed", state ? clamp((30-state.sanity)/30,0,1).toFixed(2) : "0");
  if(play && FEAT.tiers && tier!=="stable" && tier!=="gone") html.setAttribute("data-tier",tier);
  else html.removeAttribute("data-tier");
}
/* 06v2 TUBE WARP -- tier dim + barrel bulge composed into ONE filter on the fixed
   #crt frame, so the whole screen (scanlines, HUD, story) curves and dims as one
   piece of glass. The frame is viewport-sized and scrolls internally, so the filter
   region is stable: displacement only shifts painted pixels WITHIN the frame and can
   never reflow content out of the box (the v1 soft-lock). Sanity-gated: flat at high
   sanity, the bow eases in below ~60 and peaks at terminal. Cleared off-play. */
/* 06 — TUBE WARP. Tunable so the look can be dialled in live from the lab (#lab).
   strength: peak displacement px. curve: radial exponent; MUST be >=~2 to bow
   (a linear field is a flat zoom). pulse: breathing depth at strained/critical.
   *Sec: animation periods in seconds (bigger = slower). center(=fit): size and
   centre the bow on the reading column, so the copy sits in the curved zone on a
   wide desktop too, instead of stranded in the flat centre of a viewport barrel. */
const WARP = { strength:160, curve:3, pulse:0, pulseSec:5.5, termSec:4.2, madSec:9, center:true };

/* Where to park the bow and how big to make it, in normalized [-1,1] viewport units.
   center off -> a plain viewport barrel (corner radius = sqrt2). */
/* ref = the copy's reference px size; displacement is scaled by ref/REF so the bow is
   PROPORTIONAL to the content, consistent across viewport sizes instead of a fixed pixel
   count that over-bends the narrow mobile column. REF is the mobile column, so the bow is
   calibrated to mobile's punchier feel -- a wide desktop column scales UP to match it.
   CSS px already handle device density; no PPI factor (that would double-count DPR). */
const WARP_REF=360; // mobile reading column -- the punchy reference we level desktop up to
function contentFit(){
  if(!WARP.center) return {cx:0, cy:0, rad:Math.SQRT2, ref:WARP_REF};
  const el=(root.querySelector(".sc")||root), r=el.getBoundingClientRect();
  const vw=window.innerWidth||1, vh=window.innerHeight||1;
  if(!r.width || !r.height) return {cx:0, cy:0, rad:Math.SQRT2, ref:WARP_REF};
  const top=clamp(r.top,0,vh), bot=clamp(r.bottom,0,vh);
  const cx=clamp(((r.left+r.right)/2/vw)*2-1, -0.6, 0.6);
  const cy=clamp((((top+bot)/2)/vh)*2-1, -0.7, 0.7);
  const hw=r.width/vw, hh=(bot-top)/vh;              // copy half-extents (normalized)
  const rad=clamp(Math.max(hw,hh)*1.2, 0.4, Math.SQRT2); // barrel radius hugs the copy
  return {cx, cy, rad, ref:Math.max(r.width, bot-top)};
}
function applyScreenFilter(){
  if(!crtEl) return;
  const parts=[], mad=html.classList.contains("madness");
  const play=isPlayNode(), tier=(play&&state)?tierOf(state.sanity):"stable";
  if(play && FEAT.tiers){
    if(tier==="strained") parts.push("brightness(.93)","saturate(.96)");
    else if(tier==="critical") parts.push("brightness(.84)","saturate(.9)");
    else if(tier==="terminal") parts.push("brightness(.74)","saturate(.85)");
  }
  if((mad || (play&&state)) && FEAT.warp && !REDUCED){
    const fit=contentFit(), sizef=clamp(fit.ref/WARP_REF, 0.6, 2.4); // bow proportional to the copy
    if(mad){
      warpBase=WARP.strength*0.95*sizef; ensureTubeWarp(-warpBase*0.75, fit);
      parts.push("url(#tubewarp)"); runWarp();
    } else {
      const warpT=clamp((60-state.sanity)/60,0,1), scale=warpT*warpT*WARP.strength*sizef;
      if(scale>0.5){
        warpBase=scale; ensureTubeWarp(scale, fit); parts.push("url(#tubewarp)");
        // Animate ONLY at terminal (near death). Above that the bow is STATIC -- a live
        // full-screen displacement filter re-rendered every frame pegs the GPU/fan, and
        // critical is a wide band you sit in. Breathing at critical is opt-in via pulse.
        if(tier==="terminal" || WARP.pulse>0) runWarp(); else stopWarp();
      } else { warpBase=0; stopWarp(); }
    }
  } else { warpBase=0; stopWarp(); }
  crtEl.style.filter=parts.join(" ");
}

/* Convex displacement map, regenerated only when curve/centre change (cached by key).
   Magnitude = radius^curve along the radial direction; neutral point shifted to cy so
   the bow can centre on the copy. A NEGATIVE feDisplacementMap scale flips it pincushion. */
let BARREL_MAP=null, BARREL_KEY="";
function barrelMap(fit){
  const cx=Math.round(fit.cx*30)/30, cy=Math.round(fit.cy*30)/30, rd=Math.round(fit.rad*30)/30;
  const key=WARP.curve.toFixed(2)+"|"+cx+"|"+cy+"|"+rd;
  if(BARREL_MAP && BARREL_KEY===key) return BARREL_MAP;
  const S=128, cv=document.createElement("canvas"); cv.width=cv.height=S;
  const ctx=cv.getContext("2d"), img=ctx.createImageData(S,S), d=img.data;
  for(let y=0;y<S;y++) for(let x=0;x<S;x++){
    const nx=((x/(S-1))*2-1)-cx, ny=((y/(S-1))*2-1)-cy;
    const rr=Math.min(Math.hypot(nx,ny)/rd, 1), rad=Math.pow(rr, WARP.curve);
    const len=Math.hypot(nx,ny)||1, ux=nx/len, uy=ny/len;
    // OUTWARD displacement along the radius, magnitude (radius/rd)^curve, so the bow
    // fills the fitted region. +scale bows BARREL (centre magnified, convex edges);
    // -scale flips it pincushion. curve MUST be >=~2 to bow -- linear is a flat zoom.
    const dx=ux*rad, dy=uy*rad, i=(y*S+x)*4;
    d[i]=clamp(128+dx*127,0,255); d[i+1]=clamp(128+dy*127,0,255); d[i+2]=128; d[i+3]=255;
  }
  ctx.putImageData(img,0,0); BARREL_MAP=cv.toDataURL(); BARREL_KEY=key; return BARREL_MAP;
}
/* Build the SVG filter once per (viewport size + map), then drive displacement via a
   cheap scale attribute write so the breathing/wobble animates without re-decoding. */
let warpDisp=null, warpKey="";
function ensureTubeWarp(scale, fit){
  const defs=document.querySelector("#warpdefs defs");
  const w=window.innerWidth||1, h=window.innerHeight||1;
  const href=barrelMap(fit), key=w+"x"+h+"|"+BARREL_KEY; // BARREL_KEY set by barrelMap()
  if(!warpDisp || warpKey!==key){
    defs.innerHTML =
      '<filter id="tubewarp" filterUnits="userSpaceOnUse" x="0" y="0" width="'+w+'" height="'+h+'" color-interpolation-filters="sRGB">'+
      '<feImage href="'+href+'" preserveAspectRatio="none" x="0" y="0" width="'+w+'" height="'+h+'" result="m"></feImage>'+
      '<feDisplacementMap in="SourceGraphic" in2="m" scale="0" xChannelSelector="R" yChannelSelector="G"></feDisplacementMap>'+
      '</filter>';
    warpDisp=defs.querySelector("feDisplacementMap"); warpKey=key;
  }
  warpDisp.setAttribute("scale", scale.toFixed(1));
}
/* One loop, params read live each frame (so lab tweaks land instantly):
   strained/critical -> gentle breathing barrel; terminal -> barrel<->pincushion wobble
   across zero (can't hold shape); madness -> slow held pincushion breath. */
let warpRAF=0, warpBase=0;
function stopWarp(){ if(warpRAF){ cancelAnimationFrame(warpRAF); warpRAF=0; } }
function runWarp(){
  if(warpRAF || REDUCED) return;
  const t0=performance.now(); let last=-1e9;
  const tick=(t)=>{
    const mad=html.classList.contains("madness");
    if(!mad && !(state && isPlayNode() && warpBase>0.5)){ warpRAF=0; return; }
    // throttle the filter re-render to ~20fps -- the breaths/wobble are seconds long, so
    // rewriting the displacement scale every vsync frame just burns the GPU for no gain.
    if(t-last>=50){
      last=t;
      const e=(t-t0)/1000, w=2*Math.PI; let s;
      if(mad){ s=(WARP.strength*0.95)*(-0.75 + 0.3*Math.sin(w*e/WARP.madSec)); }
      else if(tierOf(state.sanity)==="terminal"){ s=warpBase*(0.2 + 0.9*Math.sin(w*e/WARP.termSec)); }
      else { s=warpBase*(1 + WARP.pulse*Math.sin(w*e/WARP.pulseSec)); }
      if(warpDisp) warpDisp.setAttribute("scale", s.toFixed(1));
    }
    warpRAF=requestAnimationFrame(tick);
  };
  warpRAF=requestAnimationFrame(tick);
}

function applyEffects(e){
  if(!e) return;
  if(typeof e.sanity==="number") state.sanity=clamp(state.sanity+e.sanity,0,100);
  (e.add||[]).forEach(i=>{ if(!state.inventory.includes(i)) state.inventory.push(i); });
  (e.remove||[]).forEach(i=>{ state.inventory=state.inventory.filter(x=>x!==i); });
  if(e.flags) Object.assign(state.flags, e.flags);
}
function meets(req){
  if(!req) return true;
  if(req.item && !state.inventory.includes(req.item)) return false;
  if(req.notItem && state.inventory.includes(req.notItem)) return false;
  if(typeof req.sanityMax==="number" && state.sanity>req.sanityMax) return false;
  if(typeof req.sanityMin==="number" && state.sanity<req.sanityMin) return false;
  if(req.flag && !state.flags[req.flag]) return false;
  if(req.notFlag && state.flags[req.notFlag]) return false;
  return true;
}
function startEpisode(ep){
  episode=ep;
  state={ sanity: ep.startSanity??100, inventory:[...(ep.startInventory||[])], flags:{}, entered:{}, current: ep.start };
  html.classList.remove("crush","madness");
  goto(ep.start); scrollTop(false);
}
function goto(id){
  const node=episode.nodes[id];
  if(!node){ console.warn("skein: choice points at missing node",id); return; } // guard; the validator forbids this
  state.current=id;
  if(node.onEnter && !state.entered[id]) applyEffects(node.onEnter);
  state.entered[id]=true; setScreen(true);
  if(state.sanity<=0 && !node.ending) return renderMadness();
  render(); scrollTop(true);
  startWatch();
}
function pickText(node){
  let t=node.text||"";
  if(node.sanityText){
    Object.keys(node.sanityText).map(Number).sort((a,b)=>b-a)
      .forEach(k=>{ if(state.sanity<=k) t=node.sanityText[k]; });
  }
  return t;
}
function sanityColor(){
  if(state.sanity>60) return "var(--green)";
  if(state.sanity>30) return "var(--phosphor)";
  return "var(--red)";
}
function hudHTML(node){
  const inv = state.inventory.length
    ? state.inventory.map(i=>`<b>${ITEM_NAMES[i]||i}</b>`).join(" · ") : "<span>— nothing —</span>";
  const med = state.inventory.includes("medgel")
    ? `<button class="medbtn" onclick="useGel()">USE MED-GEL [+25]</button>` : "";
  const tier = tierOf(state.sanity);
  const deep = FEAT.hud && !REDUCED && (tier==="critical"||tier==="terminal") ? " deep" : "";
  return `<div class="hud${deep}">
    <div class="hud-row">
      <div class="loc">${node.title?`<span class="tag">LOC //</span> ${node.title}`:""}</div>
      <div class="sanity-wrap">
        <div class="sanity-label"><span>NEURAL INTEGRITY</span><span>${state.sanity}%</span></div>
        <div class="bar"><i style="width:${state.sanity}%;background:${sanityColor()}"></i></div>
      </div>
    </div>
    <div class="hud-row" style="margin-top:6px">
      <div class="inv"><span style="color:var(--phosphor-dim)">INV //</span> ${inv}</div>${med}
    </div></div>`;
}
function render(){
  const node=episode.nodes[state.current];
  if(node.ending) return renderEnding(node.ending);
  const choices = node.choices.map((c,idx)=>{
    if(meets(c.requires)) return `<button class="choice glitchable" onclick="choose(${idx})">${c.text}</button>`;
    if(c.locked) return `<div class="choice locked">${c.locked}</div>`;
    return "";
  }).join("");
  root.innerHTML = hudHTML(node)
    + `<div class="sc" id="sc">`
    + `${node.title?`<div class="nodetitle glitchable">${node.title}</div>`:""}`
    + `<div class="prose glitchable">${pickText(node)}</div>` + choices
    + `</div>` + footer(true);
  applyScreenFilter();
}
function choose(idx){
  const c=episode.nodes[state.current].choices[idx];
  if(!meets(c.requires)) return;
  applyEffects(c.effects); setScreen(true);
  if(state.sanity<=0) return renderMadness();
  goto(c.to);
}
function useGel(){
  if(!state.inventory.includes("medgel")) return;
  applyEffects({sanity:+25, remove:["medgel"]}); setScreen(true); render(); startWatch();
}

/* ---- 02 INSTRUMENT FAILURE: the HUD mistypes and the readout lies ---- */
const LOOKALIKE={I:"1",E:"3",A:"4",O:"0",T:"7",S:"5",G:"6",L:"1",R:"Я",N:"И"};
function corruptLabel(str,intensity){ return str.split("").map(ch=>{ const up=ch.toUpperCase(); return (LOOKALIKE[up]&&Math.random()<intensity)?LOOKALIKE[up]:ch; }).join(""); }
function badValue(v,tier){
  const r=Math.random();
  if(r<0.22) return "??%";
  if(r<0.40) return "--%";
  if(r<0.62) return "█"+Math.floor(Math.random()*9)+"%";
  const drift=tier==="terminal"?rnd(-22,22):rnd(-9,9);
  return Math.round(clamp(v+drift,0,99))+"%";
}
function tickHud(){
  if(REDUCED || !FEAT.hud || !state || !isPlayNode()) return;
  const tier=tierOf(state.sanity);
  if(tier!=="critical"&&tier!=="terminal") return;
  const hud=root.querySelector(".hud"); if(!hud) return;
  const lbl=hud.querySelector(".sanity-label span:first-child");
  const val=hud.querySelector(".sanity-label span:last-child");
  if(!lbl||!val) return;
  const hit=tier==="terminal"?0.55:0.26;
  if(Math.random()<hit){
    lbl.textContent=corruptLabel("NEURAL INTEGRITY", tier==="terminal"?0.4:0.22);
    if(Math.random()<(tier==="terminal"?0.75:0.4)){ val.textContent=badValue(state.sanity,tier); hud.classList.add("corrupt"); }
    const hold=tier==="terminal"?220:150;
    setTimeout(()=>{ const h=root.querySelector(".hud"); if(!h)return;
      const l=h.querySelector(".sanity-label span:first-child"), v=h.querySelector(".sanity-label span:last-child");
      if(l)l.textContent="NEURAL INTEGRITY"; if(v&&state)v.textContent=state.sanity+"%"; h.classList.remove("corrupt"); }, hold);
  }
}

/* ---- 03 THE WATCHING: a line the player never asked for ---- */
const DEFAULT_WATCH=["YOU ARE STILL AWAKE.","IT IS LOOKING BACK.","STILL HERE.","TURN AROUND."];
let watchTimers=[];
function clearWatch(){ watchTimers.forEach(clearTimeout); watchTimers=[]; if(watchEl)watchEl.innerHTML=""; restoreProse(); }
function watchPool(){ return (episode && Array.isArray(episode.watching) && episode.watching.length) ? episode.watching : DEFAULT_WATCH; }

/* The room copy garbles WITH the watch line: same source, two presentations.
   Tokenize the watch pool into single words (strip filler), so the watcher's
   vocabulary can bleed into the prose at terminal. */
const WATCH_STOP=new Set(["THE","ARE","WAS","WERE","AND","YOUR","YOU","NOT","ALL","NOW","ONE","HAS","HAVE","BEEN","THAT","THIS","WITH","FOR","ALMOST","THROUGH","ANYMORE"]);
function watchWords(){
  const out=[];
  watchPool().forEach(line=>line.split(/[^A-Za-z']+/).forEach(w=>{
    const u=w.replace(/[^A-Za-z]/g,"").toUpperCase();
    if(u.length>=3 && !WATCH_STOP.has(u)) out.push(u);
  }));
  return out.length?out:["AWAKE","STILL","HERE","LOOKING"];
}
/* Snapshot the clean prose HTML, mutate text nodes only (never tags), restore on
   the same beat the watch line clears. Always reverts to authored copy. */
let proseSnap=null;
function corruptProse(tier){
  if(REDUCED || !FEAT.watching) return;
  const el=root.querySelector(".prose"); if(!el) return;
  if(proseSnap) restoreProse();
  proseSnap={el, html:el.innerHTML};
  const nodes=[], walk=document.createTreeWalker(el, NodeFilter.SHOW_TEXT);
  for(let n; (n=walk.nextNode()); ) nodes.push(n);
  if(tier==="terminal"){ // swap a few whole words for the watcher's own
    const words=watchWords(), pick=()=>words[Math.floor(Math.random()*words.length)];
    let budget=2+Math.floor(Math.random()*2); // 2-3, scattered across the prose
    nodes.slice().sort(()=>Math.random()-0.5).forEach(tn=>{
      if(budget<=0) return;
      tn.nodeValue=tn.nodeValue.replace(/[A-Za-z]{4,}/g, w=>
        (budget>0 && Math.random()<0.22) ? (budget--, pick()) : w);
    });
  }
  const intensity=tier==="terminal"?0.12:0.08; // lookalike char-noise, both tiers
  nodes.forEach(tn=>{ tn.nodeValue=corruptLabel(tn.nodeValue, intensity); });
}
function restoreProse(){
  if(!proseSnap) return;
  const {el,html}=proseSnap; proseSnap=null;
  if(el && el.isConnected) el.innerHTML=html;
}
function startWatch(){
  clearWatch();
  if(REDUCED || !FEAT.watching || !isPlayNode()) return;
  const tier=tierOf(state.sanity);
  if(tier!=="critical"&&tier!=="terminal") return;
  scheduleWatch(true);
}
function scheduleWatch(first){
  if(!isPlayNode()) return;
  const tier=tierOf(state.sanity);
  if(tier!=="critical"&&tier!=="terminal") return;
  const wait=first?rnd(900,2200):(tier==="terminal"?rnd(2400,4800):rnd(5000,9000));
  const t=setTimeout(()=>{
    if(!isPlayNode()) return;
    const tt=tierOf(state.sanity);
    if(tt!=="critical"&&tt!=="terminal") return;
    flashWatch(tt); scheduleWatch(false);
  }, wait);
  watchTimers.push(t);
}
function flashWatch(tier){
  const pool=watchPool(), line=pool[Math.floor(Math.random()*pool.length)];
  const dur=tier==="terminal"?"1.15s":"0.85s";
  watchEl.innerHTML=`<div class="watch-line glitchable" data-sev="${tier}" style="--watch-dur:${dur}">${esc(line)}</div>`;
  placeWatchLine(); // scatter the line over the actual room copy, never below it
  corruptProse(tier); // the room copy turns with the line, then snaps back
  const t=setTimeout(()=>{ watchEl.innerHTML=""; restoreProse(); }, tier==="terminal"?1150:850);
  watchTimers.push(t);
}
/* Drop the line at a random point WITHIN the visible prose box, then nudge it
   fully on-screen. Anchoring to the copy (not a fixed viewport %) keeps it over
   the words on any layout instead of stranded below the content. */
function placeWatchLine(){
  const el=watchEl.firstElementChild; if(!el) return;
  const vw=window.innerWidth||0, vh=window.innerHeight||0;
  const area=root.querySelector(".prose")||root.querySelector(".sc")||root;
  const r=area.getBoundingClientRect();
  const padX=Math.min(50, r.width*0.18);
  const x0=clamp(r.left+padX,24,vw-24), x1=clamp(r.right-padX,24,vw-24);
  const y0=clamp(r.top+12,32,vh-32), y1=clamp(r.bottom-12,32,vh-32);
  let cx=rnd(Math.min(x0,x1),Math.max(x0,x1)), cy=rnd(Math.min(y0,y1),Math.max(y0,y1));
  el.style.left=cx+"px"; el.style.top=cy+"px";
  const b=el.getBoundingClientRect(), m=8; // clamp the rendered box into the viewport
  if(b.left<m) cx+=m-b.left; else if(b.right>vw-m) cx-=b.right-(vw-m);
  if(b.top<m) cy+=m-b.top; else if(b.bottom>vh-m) cy-=b.bottom-(vh-m);
  el.style.left=cx+"px"; el.style.top=cy+"px";
}

/* ---- 04 DEATH GIVEN WEIGHT: the stop, the crush, the inversion ---- */
function typewrite(el, text, speed, done){
  let i=0; el.textContent="";
  const id=setInterval(()=>{ i++; el.textContent=text.slice(0,i); if(i>=text.length){ clearInterval(id); done&&done(); } }, speed);
}
function renderEnding(end){
  clearWatch(); recordScar(end.type, end.stamp);
  setScreen(false); html.removeAttribute("data-tier"); applyScreenFilter();
  if(!FEAT.endings || REDUCED){
    root.innerHTML = `<div class="ending"><div class="stamp ${end.type}">${end.stamp}</div>
      <div class="prose glitchable">${end.text}</div>
      <button class="choice restart" onclick="returnToMenu()">> Return to salvage menu</button></div>` + footer();
    scrollTop(true); return;
  }
  html.classList.add("crush");
  root.innerHTML = `<div class="ending"><div class="endblack"><span class="cursor"></span></div></div>` + footer();
  scrollTop(true);
  setTimeout(()=>{
    root.innerHTML = `<div class="ending"><div class="stamp ${end.type} glow" id="endstamp"></div>
      <div class="prose glitchable endprose" id="endprose" style="display:none">${end.text}</div>
      <div id="endactions"></div></div>` + footer();
    typewrite(document.getElementById("endstamp"), end.stamp, 64, ()=>{
      const pr=document.getElementById("endprose"); if(pr) pr.style.display="";
      const act=document.getElementById("endactions");
      if(act) act.innerHTML=`<button class="choice restart" onclick="returnToMenu()">> Return to salvage menu</button>`;
    });
  }, 1600);
}
function renderMadness(){
  clearWatch(); recordScar("madness","// COHERENCE LOST");
  html.removeAttribute("data-tier"); html.classList.add("madness");
  html.style.setProperty("--glitch","0.12"); applyScreenFilter();
  if(!FEAT.endings || REDUCED){
    root.innerHTML = `<div class="ending"><div class="stamp madness">// COHERENCE LOST</div>
      <div class="prose madprose">
        <p>The ship was always like this. You were always here. The others left because you asked them to, didn't you, didn't you, and the smiling face on the wall is just your face, it's only ever been your face, awake and awake and awake and-</p>
        <p>You stop looking for the way out. There was never a way out of a place you never left.</p></div>
      <button class="choice restart" onclick="returnToMenu()">> Return to salvage menu</button></div>` + footer();
    scrollTop(true); return;
  }
  root.innerHTML = `<div class="ending"><div class="endblack"><span class="cursor solid"></span></div></div>` + footer();
  scrollTop(true);
  setTimeout(()=>{
    root.innerHTML = `<div class="ending"><div class="stamp madness">// COHERENCE LOST</div>
      <div class="prose madprose">
        <p style="animation-delay:0s">The ship was always like this. You were always here. The others left because you asked them to, didn't you, didn't you, and the smiling face on the wall is just your face, it's only ever been your face, awake and awake and awake and-</p>
        <p style="animation-delay:1.4s">You stop looking for the way out. There was never a way out of a place you never left.</p></div>
      <div style="margin-top:8px"><span class="cursor solid" id="madcursor"></span></div>
      <div id="madactions"></div></div>` + footer();
    setTimeout(()=>{
      const c=document.getElementById("madcursor"); if(c){ c.classList.remove("solid"); c.classList.add("dying"); }
      const a=document.getElementById("madactions"); if(a) a.innerHTML=`<button class="choice restart" onclick="returnToMenu()">> Return to salvage menu</button>`;
    }, 3400);
  }, 2000);
}

/* ---- 05 THE BLACK REMEMBERS: persistent scars on the salvage menu ---- */
const SCAR_KEY="skein_scars_v1";
function loadScars(){ try{ return JSON.parse(localStorage.getItem(SCAR_KEY)||"{}"); }catch(e){ return {}; } }
function recordScar(type, stamp){
  if(!FEAT.scars || !episode) return;
  try{ const s=loadScars(); s[episode.id]={type, label:(stamp||"").replace(/^\/\/\s*/,"").trim()};
    localStorage.setItem(SCAR_KEY, JSON.stringify(s)); }catch(e){}
}

function titleScreen(){
  episode=null; state=null; clearWatch();
  html.removeAttribute("data-tier"); html.classList.remove("crush","madness");
  html.style.setProperty("--glitch","0"); html.style.setProperty("--bleed","0");
  applyScreenFilter();
  const scars = FEAT.scars ? loadScars() : {};
  const words=(MANIFEST.title||"WAKE ALONE").split(" ");
  const cards = EPISODES.map((ep,i)=>{
    const n = "EP " + String(i+1).padStart(2,"0");
    if(ep.locked) return `<div class="epcard locked"><div class="epn">${n} // ENCRYPTED</div>
      <div class="ept">[ ${ep.title} ]</div><div class="epb">${ep.byline||""}</div></div>`;
    const o = scars[ep.id];
    const scar = o ? `<div class="scar scar--${o.type}">// last attempt: ${esc(o.label||"UNKNOWN")}</div>` : "";
    return `<div class="epcard" onclick="location.hash='${ep.id}'">
      <div class="epn">${n}</div><div class="ept">${ep.title}</div>
      <div class="epb">${ep.byline||""}</div>${scar}</div>`;
  }).join("");
  root.innerHTML = `<div class="title-screen">
    <div class="bigtitle glitchable glow">${words.join("<br>")}</div>
    <div class="sub">${MANIFEST.subtitle||""}<span class="cursor"></span></div>
    <div class="eplist">${cards}</div></div>` + footer();
  scrollTop(false);
}
function footer(showExit){
  const exit = showExit
    ? `<div class="footer"><button class="abort" onclick="returnToMenu()">> abort to salvage menu</button></div>`
    : "";
  return exit + `<div class="footer">skein v${VERSION} // neural integrity at 0% ends the run // <a class="src" href="https://github.com/mandakan/wake-alone" target="_blank" rel="noopener">source</a></div>`;
}

/* ---- LAB MODE: staging-only FX showcase, opened with #lab on a non-prod host.
   Drives the SAME engine functions players hit, so it can never drift from play. ---- */
function labAllowed(){ return /(^$|^localhost$|^127\.0\.0\.1$|staging|\.workers\.dev$)/.test(location.hostname); }
let labOn=false, labAuto=false, labHold=false;
function labEpisodes(){ return EPISODES.filter(e=>!e.locked && e.nodes); }
function labSync(){
  const t=tierOf(state.sanity);
  const sv=document.getElementById("lab-sval"); if(sv) sv.textContent=state.sanity;
  const tv=document.getElementById("lab-tier"); if(tv){ tv.textContent=t.toUpperCase(); tv.className="read tier-"+t; }
  const hb=document.getElementById("lab-hold"); if(hb) hb.classList.toggle("on",labHold);
}
function labRefresh(){ // re-apply the sanity-linked screen state + re-render the sample room
  if(labHold){ restoreProse(); labHold=false; }
  setScreen(isPlayNode()); render(); labSync();
}
function labLoad(idx){
  const eps=labEpisodes(), ep=eps[idx]||eps[0]; if(!ep) return;
  const keep = state ? state.sanity : 100;
  clearWatch(); labAuto=false; startEpisode(ep);
  state.sanity=clamp(keep,1,100); labRefresh();
  const a=document.getElementById("lab-auto"); if(a) a.classList.remove("on");
}
function labSanity(v){
  if(!state) return;
  v=clamp(v|0,0,100);
  if(v<=0){ state.sanity=0; renderMadness(); const s=document.getElementById("lab-sval"); if(s)s.textContent=0; return; }
  html.classList.remove("madness","crush"); // lab can climb back out of madness; gameplay can't
  state.sanity=v; labRefresh();
  if(labAuto) startWatch();
}
function lab(){
  if(labOn) return; labOn=true;
  const eps=labEpisodes();
  if(!eps.length){ titleScreen(); return; }
  const opts=eps.map((e,i)=>`<option value="${i}">${esc(e.title)}</option>`).join("");
  const panel=document.createElement("div"); panel.className="lab"; panel.id="lab";
  panel.innerHTML=`<button class="lab-toggle" id="lab-toggle">// SKEIN LAB <span class="lab-caret">[-]</span></button>
    <div class="lab-body">
    <div class="grp">
      <label>EPISODE &mdash; watch pool + sample room</label>
      <select id="lab-ep">${opts}</select>
    </div>
    <div class="grp">
      <label>INTEGRITY <span id="lab-sval" class="read"></span>% &nbsp; TIER <span id="lab-tier" class="read"></span></label>
      <input type="range" id="lab-san" min="0" max="100" step="1" value="100">
      <div class="row">
        <button data-san="80">STABLE</button><button data-san="45">STRAINED</button>
        <button data-san="20">CRITICAL</button><button data-san="5">TERMINAL</button>
      </div>
    </div>
    <div class="grp">
      <label>WATCHER / CORRUPTION</label>
      <div class="row">
        <button id="lab-flash">FLASH WATCHER</button>
        <button id="lab-hold">HOLD GARBLE</button>
      </div>
      <div class="row">
        <button id="lab-auto">AUTO CADENCE</button>
        <button id="lab-mad">MADNESS</button>
      </div>
    </div>
    <div class="grp">
      <label>TUBE WARP <span id="lab-warpv" class="read"></span></label>
      <div class="wsl"><span>STRENGTH <b id="v-strength"></b></span><input type="range" data-warp="strength" min="0" max="220" step="5"></div>
      <div class="wsl"><span>CURVE (higher = rounder barrel; &lt;2 flattens to zoom) <b id="v-curve"></b></span><input type="range" data-warp="curve" min="1" max="4" step="0.1"></div>
      <div class="wsl"><span>PULSE depth <b id="v-pulse"></b></span><input type="range" data-warp="pulse" min="0" max="0.6" step="0.02"></div>
      <div class="wsl"><span>BREATH sec (critical) <b id="v-pulseSec"></b></span><input type="range" data-warp="pulseSec" min="2" max="14" step="0.5"></div>
      <div class="wsl"><span>WOBBLE sec (terminal) <b id="v-termSec"></b></span><input type="range" data-warp="termSec" min="2" max="12" step="0.5"></div>
      <div class="wsl"><span>BREATH sec (madness) <b id="v-madSec"></b></span><input type="range" data-warp="madSec" min="3" max="22" step="0.5"></div>
      <div class="row"><button id="lab-center">FIT BOW TO COPY</button></div>
      <div class="hint">The warp is sanity-gated -- it PEAKS at TERMINAL and is near-zero at STRAINED, so judge STRENGTH from the TERMINAL button, not high sanity. FIT sizes the bow to the reading column (off = plain viewport barrel). Tell me the set you like and I'll bake it in.</div>
    </div>
    <div class="grp" style="border:0;padding-bottom:0">
      <div class="row"><button id="lab-reset">RESET ROOM</button></div>
      <div class="hint">Word-swaps fire at TERMINAL (1-10); CRITICAL (11-30) is char-noise only. HOLD GARBLE freezes corruption so you can read it.</div>
    </div>
    </div>`;
  document.body.appendChild(panel);
  // collapsible: default collapsed on narrow screens so it doesn't cover the room
  const setCollapsed=(c)=>{ panel.classList.toggle("collapsed",c);
    const car=panel.querySelector(".lab-caret"); if(car) car.textContent=c?"[+]":"[-]"; };
  document.getElementById("lab-toggle").addEventListener("click", ()=> setCollapsed(!panel.classList.contains("collapsed")));
  setCollapsed((window.innerWidth||999)<=760);
  labLoad(0);
  const san=document.getElementById("lab-san"); san.value=state.sanity; labSync();
  document.getElementById("lab-ep").addEventListener("change", e=>{ labLoad(+e.target.value); san.value=state.sanity; labSync(); });
  san.addEventListener("input", e=> labSanity(+e.target.value));
  panel.querySelectorAll("button[data-san]").forEach(b=> b.addEventListener("click", ()=>{ san.value=b.dataset.san; labSanity(+b.dataset.san); }));
  document.getElementById("lab-flash").addEventListener("click", ()=>{ if(state&&isPlayNode()){ if(labHold){ restoreProse(); labHold=false; labSync(); } flashWatch(tierOf(state.sanity)); } });
  document.getElementById("lab-hold").addEventListener("click", ()=>{
    if(!state||!isPlayNode()) return;
    if(labHold){ restoreProse(); labHold=false; } else { corruptProse(tierOf(state.sanity)); labHold=true; }
    labSync();
  });
  document.getElementById("lab-auto").addEventListener("click", e=>{
    labAuto=!labAuto; e.target.classList.toggle("on",labAuto);
    if(labAuto) startWatch(); else clearWatch();
  });
  document.getElementById("lab-mad").addEventListener("click", ()=>{ if(state){ clearWatch(); labAuto=false; const a=document.getElementById("lab-auto"); if(a)a.classList.remove("on"); renderMadness(); } });
  document.getElementById("lab-reset").addEventListener("click", ()=>{ labLoad(+document.getElementById("lab-ep").value); san.value=state.sanity; labSync(); });
  // live warp tuning: every slider writes straight into WARP and re-applies
  function syncWarpUI(){
    panel.querySelectorAll("input[data-warp]").forEach(inp=>{ const k=inp.dataset.warp;
      inp.value=WARP[k]; const b=document.getElementById("v-"+k);
      if(b) b.textContent = (k==="strength" ? WARP[k] : Number(WARP[k]).toFixed(k==="curve"||k==="pulse"?2:1)); });
    const cb=document.getElementById("lab-center"); if(cb) cb.classList.toggle("on", WARP.center);
    const sm=document.getElementById("lab-warpv");
    if(sm) sm.textContent = `{strength:${WARP.strength}, curve:${WARP.curve}, pulse:${WARP.pulse}, pulseSec:${WARP.pulseSec}, termSec:${WARP.termSec}, madSec:${WARP.madSec}, center:${WARP.center}}`;
  }
  panel.querySelectorAll("input[data-warp]").forEach(inp=> inp.addEventListener("input", e=>{
    WARP[inp.dataset.warp]=parseFloat(e.target.value); syncWarpUI(); applyScreenFilter();
  }));
  document.getElementById("lab-center").addEventListener("click", ()=>{ WARP.center=!WARP.center; syncWarpUI(); applyScreenFilter(); });
  syncWarpUI();
}

setInterval(tickHud, 720);
window.addEventListener("resize", ()=>{ if(state){ setScreen(isPlayNode()); applyScreenFilter(); } });
/* ---- ROUTING: the URL hash is the single source of truth for which SCREEN is
   shown -- empty = salvage menu, #<episode-id> = that episode (started fresh),
   #lab = lab mode. Story nodes never touch history, so Back from any node pops
   the hash to empty and lands on the menu. ---- */
function route(){
  const hash = location.hash.replace(/^#/,"").toLowerCase();
  if(hash==="lab"){ if(labAllowed() && !labOn) lab(); return; }
  if(labOn) return; // lab owns the screen on staging; never auto-leaves it
  const ep = hash && EPISODES.find(e=> (e.id||"").toLowerCase()===hash && !e.locked && e.nodes);
  if(ep){ if(!episode || episode.id!==ep.id) startEpisode(ep); return; }
  // empty / unknown / locked -> menu (guarded so a duplicate empty hashchange is a no-op)
  if(episode || !root.querySelector(".title-screen")) titleScreen();
}
function returnToMenu(){ if(location.hash) location.hash=""; else route(); }
const labHash=()=> location.hash.toLowerCase()==="#lab";
window.addEventListener("hashchange", route);
route();
</script>
