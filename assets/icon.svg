<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- WAKE ALONE favicon: a terminal prompt (chevron + block caret) on the void.
       Amber phosphor on near-black, with a soft bloom and CRT scanlines. One SVG;
       inlined as a data-URI in the engine <head>, and rendered to apple-touch-icon.png. -->
  <defs>
    <filter id="bloom" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="1.1" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="32" height="32" fill="#070806"/>
  <g filter="url(#bloom)">
    <path d="M6 10 L12 16 L6 22" fill="none" stroke="#ffb000" stroke-width="2.6"/>
    <rect x="16" y="9.5" width="9" height="13" fill="#ffb000"/>
  </g>
  <g opacity="0.6" fill="#070806">
    <rect x="0" y="2" width="32" height="1.1"/><rect x="0" y="5" width="32" height="1.1"/>
    <rect x="0" y="8" width="32" height="1.1"/><rect x="0" y="11" width="32" height="1.1"/>
    <rect x="0" y="14" width="32" height="1.1"/><rect x="0" y="17" width="32" height="1.1"/>
    <rect x="0" y="20" width="32" height="1.1"/><rect x="0" y="23" width="32" height="1.1"/>
    <rect x="0" y="26" width="32" height="1.1"/><rect x="0" y="29" width="32" height="1.1"/>
  </g>
</svg>
