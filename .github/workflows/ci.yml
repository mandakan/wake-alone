name: CI

# Pre-merge gate: validate every episode and build the standalone bundle.
# Runs on every PR and on pushes to main. The deploy workflows build separately,
# so a red CI here never ships -- and once main requires this check, a red build
# blocks merge.
on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Validate episodes
        run: npm run validate
      - name: Build bundle
        run: npm run build
      - name: Assert bundle was produced
        run: test -s dist/index.html
